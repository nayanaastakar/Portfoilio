services:
  - type: web
    name: portfolio
    runtime: python3
    rootDirectory: portfolio_project
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn portfolio_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: portfolio_project.settings
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        generateValue: true