{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} Portfolio {% endblock %}</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/port_index.css' %}?v=12">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

   <!-- Header -->
<header class="navbar">

    <div class="container navbar-container">

        <!-- Logo LEFT -->
        <h2 class="logo">Nayana R A</h2>

        <!-- Mobile menu button -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle mobile menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Nav RIGHT -->
        <nav class="navbar-nav" id="navbarNav">
            <a href="{% url 'port_index' %}" class="{% if request.resolver_match.url_name == 'port_index' %}active{% endif %}">Home</a>
            <a href="{% url 'port_about' %}" class="{% if request.resolver_match.url_name == 'port_about' %}active{% endif %}">About</a>
            <a href="{% url 'port_edu' %}" class="{% if request.resolver_match.url_name == 'port_edu' %}active{% endif %}">Education</a>
            <a href="{% url 'port_skills' %}" class="{% if request.resolver_match.url_name == 'port_skills' %}active{% endif %}">Skills</a>
            <a href="{% url 'port_projects' %}" class="{% if request.resolver_match.url_name == 'port_projects' %}active{% endif %}">Projects</a>
            <a href="{% url 'port_cont' %}" class="{% if request.resolver_match.url_name == 'port_cont' %}active{% endif %}">Contact</a>
            
            <!-- Theme Toggle Button -->
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <span class="theme-icon">
                    <span class="moon-icon"></span>
                    <span class="sun-icon"></span>
                </span>
            </button>
        </nav>

    </div>
</header>



    <!-- Page Content -->
    {% block content %}
    {% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <p>© 2025 Nayana R A. All rights reserved.</p>
    </footer>

    <!-- JS (ALWAYS before closing body) -->
    <script src="{% static 'js/port_index.js' %}"></script>

</body>
</html>
